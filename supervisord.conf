[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log

[program:redis]
command=redis-server /etc/redis/redis.conf
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:wx-backend]
command=/app/docker-wx-main
directory=/app/docker-wx-conf
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:wx-admin]
command=/app/wx-admin
directory=/app
environment=WX_API="http://127.0.0.1:8057",ADMIN_TOKEN="admin123",PORT="8022"
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
